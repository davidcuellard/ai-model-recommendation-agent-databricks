bundle:
  name: rag-agent

variables:
  unity_catalog:
    description: Unity Catalog name
    default: dcue_demo
  unity_schema:
    description: Unity Schema name
    default: rag_agent
  unity_table:
    description: Delta table name for OpenRouter models
    default: openrouter_models
  vs_endpoint_name:
    description: Vector Search endpoint name
    default: rag-agent-endpoint
  vs_index_name:
    description: Fully qualified Vector Search index name (catalog.schema.index)
    default: dcue_demo.rag_agent.openrouter_models_index
  cluster_id:
    description: Existing cluster ID for the ingestion job

resources:
  apps:
    rag-agent:
      name: rag-agent
      source_code_path: ./
      resources:
        - name: OPENROUTER_API_KEY
          secret:
            scope: dcue-demo-scope
            key: OPENROUTER_API_KEY
            permission: READ
        - name: OPENROUTER_MODEL
          secret:
            scope: dcue-demo-scope
            key: OPENROUTER_MODEL
            permission: READ
        - name: DATABRICKS_HOST
          secret:
            scope: dcue-demo-scope
            key: DATABRICKS_HOST
            permission: READ
        - name: VECTOR_SEARCH_ENDPOINT_NAME
          secret:
            scope: dcue-demo-scope
            key: VECTOR_SEARCH_ENDPOINT_NAME
            permission: READ
        - name: VECTOR_SEARCH_INDEX_NAME
          secret:
            scope: dcue-demo-scope
            key: VECTOR_SEARCH_INDEX_NAME
            permission: READ

  jobs:
    openrouter_ingestion:
      name: openrouter-ingestion
      tasks:
        - task_key: ingest
          spark_python_task:
            python_file: jobs/ingestion/ingest.py
            parameters:
              - ${var.unity_catalog}
              - ${var.unity_schema}
              - ${var.unity_table}
              - ${var.vs_endpoint_name}
              - ${var.vs_index_name}
          existing_cluster_id: ${var.cluster_id}
          libraries:
            - pypi:
                package: httpx>=0.27.0
            - pypi:
                package: databricks-sdk>=0.33.0
